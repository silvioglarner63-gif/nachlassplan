<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NachlassPlaner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --w:#fff;--g50:#fafafa;--g100:#f4f4f4;--g200:#ebebeb;--g300:#d6d6d6;
  --g400:#a3a3a3;--g500:#737373;--g600:#525252;--g700:#404040;--g800:#262626;--g900:#171717;
  --r:6px;--font:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;
}
body{font-family:var(--font);background:var(--w);color:var(--g900);height:100vh;overflow:hidden;font-size:14px;-webkit-font-smoothing:antialiased}
.shell{display:flex;height:100vh}

/* NAV */
.nav{width:230px;flex-shrink:0;border-right:1px solid var(--g200);display:flex;flex-direction:column;background:var(--w)}
.nav-header{padding:20px 18px 14px;border-bottom:1px solid var(--g200)}
.logo-partner{font-size:15px;font-weight:600;color:var(--g900);margin-bottom:2px}
.logo-powered{font-size:11px;color:var(--g400)}
.logo-powered span{color:var(--g600)}
.nav-group{padding:14px 10px 4px}
.nav-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--g400);padding:0 8px;margin-bottom:4px;display:block}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--g600);transition:all .1s;user-select:none}
.nav-item:hover{background:var(--g100);color:var(--g900)}
.nav-item.active{background:var(--g100);color:var(--g900);font-weight:500}
.nav-item svg{width:14px;height:14px;flex-shrink:0;opacity:.55}
.nav-item.active svg{opacity:.85}
.nav-case{display:flex;align-items:center;gap:9px;padding:6px 10px;border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--g500);transition:all .1s}
.nav-case:hover{background:var(--g100);color:var(--g800)}
.nav-case.active{background:var(--g100);color:var(--g900);font-weight:500}
.nav-dot{width:6px;height:6px;border-radius:50%;background:var(--g300);flex-shrink:0;margin-left:2px}
.nav-case.active .nav-dot{background:var(--g600)}
.nav-footer{margin-top:auto;padding:12px 16px;border-top:1px solid var(--g200);display:flex;align-items:center;gap:9px}
.user-av{width:28px;height:28px;border-radius:50%;background:var(--g200);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--g600);flex-shrink:0}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;border-bottom:1px solid var(--g200);flex-shrink:0}
.topbar-title{font-size:15px;font-weight:600;color:var(--g900)}
.breadcrumb{display:flex;align-items:center;gap:8px;font-size:14px}
.bread-link{color:var(--g400);cursor:pointer}
.bread-link:hover{color:var(--g700)}
.bread-sep{color:var(--g300);font-size:16px}
.bread-cur{color:var(--g900);font-weight:500}
.topbar-actions{display:flex;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);font-size:13px;font-family:var(--font);font-weight:500;cursor:pointer;transition:all .1s;outline:none;white-space:nowrap;border:1px solid var(--g300);background:var(--w);color:var(--g700)}
.btn:hover{background:var(--g50);border-color:var(--g400)}
.btn-dark{background:var(--g900);border-color:var(--g900);color:var(--w)}
.btn-dark:hover{background:var(--g800)}
.btn svg{width:13px;height:13px;opacity:.7}
.page{flex:1;overflow-y:auto;padding:24px}
.page::-webkit-scrollbar{width:4px}
.page::-webkit-scrollbar-thumb{background:var(--g200);border-radius:2px}

/* DASHBOARD */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
.kpi{padding:18px 20px;border:1px solid var(--g200);border-radius:8px}
.kpi-label{font-size:12px;color:var(--g400);font-weight:500;margin-bottom:6px}
.kpi-val{font-size:24px;font-weight:600;color:var(--g900);letter-spacing:-.5px;line-height:1;margin-bottom:3px}
.kpi-sub{font-size:12px;color:var(--g400)}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-title{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--g400)}
.case-table{width:100%;border-collapse:collapse}
.case-table thead th{text-align:left;font-size:11px;font-weight:600;color:var(--g400);letter-spacing:.04em;text-transform:uppercase;padding:0 14px 10px;border-bottom:1px solid var(--g200)}
.case-table tbody tr{border-bottom:1px solid var(--g100);cursor:pointer;transition:background .08s}
.case-table tbody tr:hover{background:var(--g50)}
.case-table tbody td{padding:13px 14px;font-size:13.5px;vertical-align:middle}
.case-table tbody td:first-child{font-weight:500;color:var(--g900)}
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px}
.badge-draft{background:var(--g100);color:var(--g500)}
.badge-active{background:var(--g200);color:var(--g700)}
.prog{height:3px;background:var(--g200);border-radius:2px;width:80px}
.prog-fill{height:100%;background:var(--g500);border-radius:2px}

/* FALL LAYOUT */
.fall-layout{display:flex;flex:1;overflow:hidden}
.fall-sidebar{width:280px;flex-shrink:0;border-right:1px solid var(--g200);display:flex;flex-direction:column;overflow:hidden}
.sidebar-top{padding:14px 16px;border-bottom:1px solid var(--g200)}
.sidebar-sec{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--g400);padding:11px 16px 5px}
.sidebar-scroll{overflow-y:auto;flex:1;padding:5px 7px}
.asset-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r);cursor:pointer;margin-bottom:1px;transition:background .1s}
.asset-item:hover{background:var(--g100)}
.asset-item.active{background:var(--g100)}
.asset-icon{width:30px;height:30px;border-radius:var(--r);background:var(--g100);border:1px solid var(--g200);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--g500)}
.asset-icon svg{width:14px;height:14px}
.asset-name{font-size:12.5px;font-weight:500;color:var(--g800);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.asset-val{font-size:11px;color:var(--g400)}
.sidebar-add{display:flex;align-items:center;gap:8px;padding:7px 10px;margin:4px 0;border:1px dashed var(--g300);border-radius:var(--r);cursor:pointer;font-size:12.5px;color:var(--g400);transition:all .1s}
.sidebar-add:hover{border-color:var(--g500);color:var(--g700)}
.sidebar-div{height:1px;background:var(--g200);margin:7px 10px}

/* TABS */
.tab-bar{display:flex;border-bottom:1px solid var(--g200);padding:0 22px;background:var(--w);flex-shrink:0}
.tab{display:flex;align-items:center;gap:7px;padding:12px 4px;margin-right:22px;font-size:13.5px;color:var(--g400);cursor:pointer;border-bottom:2px solid transparent;transition:color .1s}
.tab:hover{color:var(--g700)}
.tab.active{color:var(--g900);font-weight:500;border-bottom-color:var(--g900)}
.tab svg{width:13px;height:13px;opacity:.6}
.tab.active svg{opacity:.9}

/* DETAIL */
.detail{flex:1;overflow-y:auto;padding:22px 24px;display:flex;flex-direction:column;gap:14px}
.detail::-webkit-scrollbar{width:4px}
.detail::-webkit-scrollbar-thumb{background:var(--g200);border-radius:2px}
.kpi-sm-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.kpi-sm{padding:14px 16px;background:var(--g50);border-radius:8px;border:1px solid var(--g200)}
.kpi-sm .kpi-label{font-size:11px;color:var(--g400);margin-bottom:4px}
.kpi-sm .kpi-val{font-size:19px;font-weight:600;color:var(--g900)}
.kpi-sm .kpi-sub{font-size:11px;color:var(--g400);margin-top:2px}
.card{background:var(--w);border:1px solid var(--g200);border-radius:8px;overflow:hidden}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--g200);background:var(--g50)}
.card-title{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:600;color:var(--g800)}
.card-title svg{width:14px;height:14px;color:var(--g400)}
.card-body{padding:16px}
.mode-sw{display:inline-flex;border:1px solid var(--g300);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
.mode-btn{padding:4px 11px;font-size:11.5px;font-family:var(--font);font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--g500);white-space:nowrap}
.mode-btn.active{background:var(--g700);color:var(--w)}
.heir-row{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--g100)}
.heir-row:last-child{border-bottom:none}
.heir-av{width:30px;height:30px;border-radius:50%;background:var(--g100);color:var(--g600);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.heir-info{flex:1}
.heir-name{font-size:13.5px;font-weight:500;color:var(--g900)}
.heir-sub{font-size:11.5px;color:var(--g400);margin-top:1px}
.heir-pct{font-size:16px;font-weight:600;color:var(--g900);min-width:42px;text-align:right}
.heir-pct-input::-webkit-inner-spin-button,.heir-pct-input::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.heir-pct-input[type=number]{-moz-appearance:textfield}
.heir-amt{font-size:12px;color:var(--g500);text-align:right}
.heir-track{height:2px;background:var(--g200);border-radius:1px;overflow:hidden;margin-top:3px}
.heir-fill{height:100%;background:var(--g600);border-radius:1px;transition:width .3s}
input[type=range]{width:100%;margin-top:6px;cursor:pointer;accent-color:var(--g800)}
.info-note{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;background:var(--g50);border:1px solid var(--g200);border-radius:var(--r);font-size:12.5px;color:var(--g600);line-height:1.5}
.info-note svg{width:14px;height:14px;flex-shrink:0;margin-top:1px;color:var(--g500)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-field{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:12px;font-weight:500;color:var(--g500);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.form-input{padding:8px 11px;border:1px solid var(--g300);border-radius:var(--r);font-size:13.5px;font-family:var(--font);color:var(--g900);background:var(--w);outline:none;transition:border-color .1s;width:100%}
.form-input:focus{border-color:var(--g600)}
.erben-table{width:100%;border-collapse:collapse}
.erben-table th{text-align:left;font-size:11px;font-weight:600;color:var(--g400);letter-spacing:.04em;text-transform:uppercase;padding:8px 16px 8px;border-bottom:1px solid var(--g200)}
.erben-table td{padding:11px 16px;border-bottom:1px solid var(--g100);font-size:13.5px;vertical-align:middle}
.erben-table tfoot td{padding:9px 16px;border-top:2px solid var(--g200);background:var(--g50);font-size:13px;font-weight:600}

/* TREE */
.tree-area{flex:1;overflow:auto;padding:28px;display:flex;flex-direction:column;align-items:center;gap:0}
.tree-root{background:var(--w);border:1.5px solid var(--g900);border-radius:8px;padding:12px 18px;display:flex;align-items:center;gap:12px;position:relative;min-width:210px}
.tree-badge{position:absolute;top:-10px;right:12px;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--g900);color:var(--w)}
.tree-heir{background:var(--w);border:1px solid var(--g200);border-radius:8px;padding:12px 14px;min-width:155px;cursor:pointer;transition:border-color .1s}
.tree-heir:hover{border-color:var(--g400)}
.tree-tag{display:inline-block;font-size:10px;font-weight:500;padding:2px 6px;border-radius:4px;background:var(--g100);color:var(--g500);margin:1px}
.warn-bar{padding:9px 22px;border-top:1px solid var(--g200);font-size:12px;color:var(--g400);display:flex;gap:8px;flex-shrink:0}

/* ABZÜGE */
.abz-item{margin-bottom:2px}
.abz-row{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r);cursor:pointer;transition:background .1s}
.abz-row:hover{background:var(--g100)}
.abz-row.active{background:var(--g100)}
.abz-detail{margin:0 7px 6px;padding:12px 14px;background:var(--g50);border-radius:var(--r);border:1px solid var(--g200);display:none}
.abz-detail.open{display:block}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.28);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal{background:var(--w);border-radius:10px;width:460px;max-height:90vh;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,.14);border:1px solid var(--g200)}
.modal-wide{width:520px}
.modal::-webkit-scrollbar{width:4px}
.modal::-webkit-scrollbar-thumb{background:var(--g200);border-radius:2px}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid var(--g200);position:sticky;top:0;background:var(--w);z-index:1}
.modal-title{font-size:15px;font-weight:600;color:var(--g900)}
.modal-x{width:26px;height:26px;border-radius:5px;border:none;background:transparent;cursor:pointer;font-size:18px;color:var(--g400);display:flex;align-items:center;justify-content:center}
.modal-x:hover{background:var(--g100)}
.modal-body{padding:18px}
.modal-foot{padding:13px 18px;border-top:1px solid var(--g200);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:var(--w)}
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:16px}
.type-tile{border:1px solid var(--g200);border-radius:7px;padding:11px 7px;cursor:pointer;text-align:center;font-size:12px;color:var(--g500);transition:all .1s;background:var(--w)}
.type-tile:hover{border-color:var(--g400);color:var(--g700);background:var(--g50)}
.type-tile.sel{border:1.5px solid var(--g900);background:var(--g50);color:var(--g900);font-weight:500}
.type-tile svg{width:16px;height:16px;display:block;margin:0 auto 5px;opacity:.5}
.type-tile.sel svg{opacity:.85}

/* STEPS */
.steps{display:flex;padding:12px 18px;gap:0;border-bottom:1px solid var(--g200);background:var(--g50)}
.step{display:flex;align-items:center;flex:1;gap:7px}
.step-n{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.step-n.done{background:var(--g900);color:var(--w)}
.step-n.cur{background:var(--g900);color:var(--w)}
.step-n.todo{background:var(--g300);color:var(--g600)}
.step-lbl{font-size:12px;font-weight:500}
.step-lbl.cur{color:var(--g900)}
.step-lbl.todo{color:var(--g400)}
.step-line{flex:1;height:1px;background:var(--g200);margin:0 4px}
.person-chip{display:flex;align-items:center;gap:9px;padding:8px 10px;background:var(--g50);border:1px solid var(--g200);border-radius:var(--r);margin-bottom:5px}
.person-chip .nav-dot{width:8px;height:8px}
.role-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:13px}
.role-tile{border:1px solid var(--g200);border-radius:var(--r);padding:8px 5px;cursor:pointer;text-align:center;font-size:11.5px;color:var(--g500);background:var(--w);transition:all .1s}
.role-tile:hover{border-color:var(--g400);background:var(--g50)}
.role-tile.sel{border:1.5px solid var(--g900);background:var(--g50);color:var(--g900);font-weight:500}
.upload-zone{border:1px dashed var(--g300);border-radius:var(--r);padding:14px 16px;text-align:center;cursor:pointer;transition:all .1s;background:var(--g50);margin-bottom:4px}
.upload-zone:hover{border-color:var(--g600);background:var(--w)}
.sec-label{font-size:11px;font-weight:600;color:var(--g500);margin-bottom:8px;margin-top:6px;display:block}
</style>
</head>
<body>
<input id="global-logo-input" type="file" accept="image/*" style="display:none" onchange="onLogoSelected(this)"/>
<div class="shell">
  <!-- NAV -->
  <nav class="nav" id="sidenav"></nav>
  <!-- MAIN -->
  <main class="main" id="main"></main>
</div>

<!-- MODALS -->
<div id="modal-asset" class="modal-bg" style="display:none"></div>
<div id="modal-abzug" class="modal-bg" style="display:none"></div>
<div id="modal-fall" class="modal-bg" style="display:none"></div>
<div id="modal-invite" class="modal-bg" style="display:none" onclick="hideModal('modal-invite')"></div>
<div id="modal-user" class="modal-bg" style="display:none" onclick="hideModal('modal-user')"></div>
<div id="modal-share" class="modal-bg" style="display:none"></div>
<div id="modal-heir" class="modal-bg" style="display:none"></div>

<script>

function triggerLogoUpload(){
  document.getElementById('global-logo-input').click();
}
function onLogoSelected(input){
  const f=input.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=function(ev){
    window._logoUrl=ev.target.result;
    saveToStorage();
    renderNav(); // Nav neu rendern mit Logo
  };
  r.readAsDataURL(f);
}
// ── UTILS ──────────────────────────────────────────────────────────────────
const chf = n => 'CHF ' + Math.round(n).toLocaleString('de-CH');
const chfK = n => chf(n);
const el = id => document.getElementById(id);
const svg = (path,size=14) => `<svg width="${size}" height="${size}" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round"><path d="${path}"/></svg>`;
const svgRect = (path,size=14) => `<svg width="${size}" height="${size}" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1.2"/><rect x="9" y="1" width="6" height="6" rx="1.2"/><rect x="1" y="9" width="6" height="6" rx="1.2"/><rect x="9" y="9" width="6" height="6" rx="1.2"/></svg>`;
const distVal = a => (a.type==='real_estate'&&a.hypothek>0)?Math.max(0,a.value-a.hypothek):a.value;

// ── ICONS ──────────────────────────────────────────────────────────────────
const I = {
  grid:   ()=>svgRect(),
  case_:  ()=>svg("M3 3h10a1 1 0 011 1v9a1 1 0 01-1 1H3a1 1 0 01-1-1V4a1 1 0 011-1zM2 6h12M6 6v7"),
  home:   ()=>svg("M2 8L8 2l6 6v7H2V8zM6 15V9h4v6"),
  bank:   ()=>svg("M1 6l7-4 7 4v1H1V6zM3 7v5M8 7v5M13 7v5M1 12h14"),
  firm:   ()=>svg("M2 15V4l5-3 5 3v11M6 15V9h4v6M1 15h14"),
  car:    ()=>svg("M3 10l1-4h8l1 4M1 10h14v4H1zM4 14v1M12 14v1"),
  gem:    ()=>svg("M5 2h6l3 5-6 7-6-7 3-5zM2 7h12"),
  cash:   ()=>svg("M1 4h14v8H1zM8 8a2 2 0 100-4 2 2 0 000 4z"),
  shield: ()=>svg("M8 2l5 3v4c0 3-5 5-5 5S3 12 3 9V5l5-3z"),
  pk:     ()=>svg("M8 2a3 3 0 100 6 3 3 0 000-6zM2 14c0-3.3 2.7-6 6-6s6 2.7 6 6M5 14h6"),
  other:  ()=>svg("M8 3v10M3 8h10"),
  coffin: ()=>svg("M5 2h6l2 3v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5L5 2zM8 7v3M6 9h4"),
  doc:    ()=>svg("M4 2h5l3 3v9H4V2zM9 2v3h3M6 8h4M6 11h3"),
  tree:   ()=>svg("M8 2.5a2 2 0 010 0M8 4v4M8 8l-4.5 4M8 8l4.5 4M3.5 12a2 2 0 010 0M12.5 12a2 2 0 010 0"),
  tax:    ()=>svg("M2 2h12v12H2zM5 8h6M5 11h4M5 5h6"),
  plus:   ()=>svg("M8 3v10M3 8h10"),
  check:  ()=>svg("M3 8l4 4 6-6"),
  warn:   ()=>svg("M8 3l6 11H2L8 3zM8 8v3M8 13v0"),
  minus:  ()=>svg("M3 8h10"),
  share:  ()=>svg("M11 4l3 3-3 3M14 7H5a3 3 0 000 6h1"),
  upload: ()=>svg("M8 10V4M5 7l3-3 3 3M2 13h12"),
  mail:   ()=>svg("M2 4h12v8H2zM2 4l6 5 6-5"),
  gift:   ()=>svg("M3 6h10v2H3zM4 8v7h8V8M8 6a2 2 0 000-4 2 2 0 000 4M8 6V2"),
  person: ()=>svg("M8 2a3 3 0 100 6 3 3 0 000-6zM2 14c0-3.3 2.7-6 6-6s6 2.7 6 6"),
};

// Erben für einen konkreten Fall holen
function getHeirs(c){ return (c&&c.heirs&&c.heirs.length>0)?c.heirs:HEIRS_DEFAULT; }
// Allocs initialisieren falls noch nicht vorhanden
function ensureAllocs(c){
  const heirs=getHeirs(c);
  c.assets.forEach(a=>{
    if(!a.allocs) a.allocs={};
    heirs.forEach(h=>{ if(a.allocs[h.id]===undefined) a.allocs[h.id]=0; });
  });
}

// ── DASHBOARD ──────────────────────────────────────────────────────────────
function renderDashboard(){
  const totalVol = cases.reduce((s,c)=>s+totalVal(c),0);
  const pflichtProbleme = cases.filter(cas=>{
    const h=getHeirs(cas), n=netto(cas);
    const totalDV=cas.assets.reduce((s,a)=>s+distVal(a),0);
    return h.some(heir=>{
      // Gesamtanspruch: gewichteter Anteil am Netto-Nachlass
      const rawGot=cas.assets.reduce((s,a)=>{
        const m=a.mode||'legal';
        return s+(distVal(a)*(m==='legal'?heir.legalPct:(a.allocs[heir.id]||0))/100);
      },0);
      const got=totalDV>0?rawGot/totalDV*n:0;
      const pflicht=n*heir.pflichtPct/100;
      return got<pflicht;
    });
  }).length;
  const ohneTestament = cases.filter(cas=>cas.assets.length===0).length;
  el('main').innerHTML = `
    <div class="topbar">
      <div class="topbar-title">Dashboard</div>
      <div class="topbar-actions">
        <button class="btn btn-dark" onclick="openNewFall()">${I.plus()} Neuer Fall</button>
      </div>
    </div>
    <div class="page">
      <div class="kpi-row">
        <div class="kpi"><div class="kpi-label">Aktive Fälle</div><div class="kpi-val">${cases.length}</div><div class="kpi-sub">Nachlassplanungen</div></div>
        <div class="kpi"><div class="kpi-label">Gesamtvolumen</div><div class="kpi-val">${chf(totalVol)}</div><div class="kpi-sub">Alle erfassten Assets</div></div>
        <div class="kpi"><div class="kpi-label">Pflichtteil-Probleme</div><div class="kpi-val">${pflichtProbleme>0?pflichtProbleme:0}</div><div class="kpi-sub">${pflichtProbleme>0?pflichtProbleme+' Fall/Fälle prüfen':'Alle Pflichtteile gedeckt'}</div></div>
        <div class="kpi"><div class="kpi-label">Abgeschlossen</div><div class="kpi-val">${cases.filter(cas=>cas.abgeschlossen).length}</div><div class="kpi-sub">${cases.filter(cas=>cas.abgeschlossen).length>0?'Fall/Fälle':'Noch keine'}</div></div>
      </div>
      <div style="padding:0 32px 32px">
        <div style="font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--g400);margin-bottom:12px;padding-top:8px">F\u00e4lle</div>
        <table class="case-table">
          <thead><tr><th>Fall</th><th>Standort</th><th>Volumen</th><th>Assets</th><th>Status</th><th>Fortschritt</th><th></th></tr></thead>
          <tbody>${cases.map((c,i)=>`<tr onclick="openCase('${c.id}')" style="cursor:pointer">
            <td><strong style="white-space:nowrap">Fall ${String(i+1).padStart(2,'0')}</strong></td>
            <td>${c.location||c.canton}</td>
            <td>${chf(totalVal(c))}</td>
            <td>${c.assets.length}</td>
            <td><span class="badge ${calcStatus(c)==='Abgeschlossen'?'':''}${calcStatus(c)==='Aktiv'?'badge-active':calcStatus(c)==='Abgeschlossen'?'badge-done':'badge-draft'}">${calcStatus(c)==='Abgeschlossen'?'✓ Abgeschlossen':calcStatus(c)}</span></td>
            <td><div class="prog"><div class="prog-fill" style="width:${calcProgress(c)}%;background:${c.abgeschlossen?'#16a34a':'var(--g700)'}"></div></div></td>
            <td style="color:var(--g300);font-size:18px;text-align:right">›</td>

function setTab(t){
  activeTab=t;
  // Tab-Bar Klassen aktualisieren ohne re-render
  ['assets','tree','docs'].forEach(tab=>{
    const el_tab = document.querySelector('.tab-bar .tab:nth-child('+((['assets','tree','docs'].indexOf(tab)+1))+')');
    // Einfacher: alle tabs finden und klassen setzen
  });
  // Tab-Bar komplett neu rendern (nur die Tab-Bar div)
  const tb = document.querySelector('.tab-bar');
  if(tb){
    tb.innerHTML = `
      <div class="tab${t==='assets'?' active':''}" onclick="setTab('assets')">${I.grid()} Nachlassinventar & Zuteilung</div>
      <div class="tab${t==='digital'?' active':''}" onclick="setTab('digital')">${I.shield()} Digitaler Nachlass</div>
      <div class="tab${t==='tree'?' active':''}" onclick="setTab('tree')">${I.tree()} Erbbaum</div>
      <div class="tab${t==='docs'?' active':''}" onclick="setTab('docs')">${I.doc()} Dokumente</div>`;
  }
  renderTabContent();
}
function renderTabContent(){
  const c=getCase(); if(!c) return;
  const tc=el('tab-content'); if(!tc) return;
  if(activeTab==='assets') renderAssetsTab(c);
  else if(activeTab==='tree') renderTreeTab(c);
  else if(activeTab==='docs') renderDocsTab(c);
  else if(activeTab==='digital') renderDigitalTab(c);
  saveToStorage();
}

// ── TREE TAB ───────────────────────────────────────────────────────────────
function renderTreeTab(c){
  const HEIRS=getHeirs(c);
  const net=netto(c);
  const abzt=totalAbz(c);

  const heirCards=HEIRS.map(h=>{
    const totalDV=c.assets.reduce((s,a)=>s+distVal(a),0);
    const raw=c.assets.reduce((s,a)=>{
      const m=a.mode||'legal';
      return s+(distVal(a)*(m==='legal'?h.legalPct:(a.allocs[h.id]||0))/100);
    },0);
    const got=totalDV>0?raw/totalDV*net:0;
    const treeVor=(c.vorempfaenge||[]).filter(v=>v.heirId===h.id&&v.ausgleich).reduce((s,v)=>s+v.betrag,0);
    const pct=net>0?Math.round(got/net*100):0;
    return `<div class="tree-heir">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <div class="heir-av" style="width:30px;height:30px;font-size:11px">${h.init}</div>
        <div>
          <div style="font-size:13px;font-weight:600;color:var(--g900)">${h.name}</div>
          <div style="font-size:11px;color:var(--g400)">${h.role} (Pflichtteil · ${h.pflichtPct}%)</div>
        </div>
      </div>
      <div style="font-size:18px;font-weight:700;color:var(--g900);letter-spacing:-.3px">${chf(got)}</div>
      <div style="font-size:11px;color:var(--g400);margin-top:2px">${pct}% des Netto-Nachlasses</div>
      ${treeVor>0?'<div style="font-size:11px;color:#D97706;margin-top:3px">&#8722;'+chf(treeVor)+' Vorempfang · '+chf(Math.max(0,got-treeVor))+' verbleibend</div>':''}
    </div>`;
  }).join('');

  const ausgleich=HEIRS.map(h=>{
    const legal=net*h.legalPct/100;
    const totalDV2=c.assets.reduce((s,a)=>s+distVal(a),0);
    const raw2=c.assets.reduce((s,a)=>{
      const m=a.mode||'legal';
      return s+(distVal(a)*(m==='legal'?h.legalPct:(a.allocs[h.id]||0))/100);
    },0);
    const got=totalDV2>0?raw2/totalDV2*net:0;
    const diff=Math.round(got-legal);
    return `<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--g200);font-size:13px">
      <div style="display:flex;align-items:center;gap:9px">
        <div class="heir-av" style="width:26px;height:26px;font-size:10px">${h.init}</div>
        <span style="font-weight:500">${h.name}</span>
      </div>
      <div style="display:flex;align-items:center;gap:16px;font-size:12px">
        <span style="color:var(--g400)">Gesetzl. ${chf(legal)}</span>
        <span style="color:var(--g400)">→</span>
        <span style="font-weight:600;color:var(--g800)">${chf(Math.round(got))}</span>
        <span style="font-weight:600;min-width:80px;text-align:right;color:${diff>=0?'var(--g700)':'var(--g400)'}">${diff>=0?'+':''}${chf(diff)}</span>
      </div>
    </div>`;
  }).join('');

  el('tab-content').innerHTML=`
    <div style="flex:1;overflow:auto;background:linear-gradient(160deg,#f8f8f7 0%,#f1f1ef 100%);display:flex;flex-direction:column">
      <div class="tree-area">
        <!-- Erblasser -->
        <div class="tree-root">
          <div class="tree-badge">Erblasser</div>
          <div class="heir-av" style="width:38px;height:38px;font-size:13px">${(c.erblasser?.vorname?.[0]||'E')+(c.erblasser?.nachname?.[0]||'')}</div>
          <div>
            <div style="font-size:15px;font-weight:700">${c.erblasser?c.erblasser.vorname+' '+c.erblasser.nachname:c.name.replace('Nachlass ','')}</div>
            <div style="font-size:12px;color:var(--g400)">${c.canton} · ${c.location}</div>
            <div style="font-size:13px;font-weight:600;color:var(--g700);margin-top:3px">${chf(net)} netto</div>
          </div>
        </div>
        ${abzt>0?`<div style="font-size:12px;color:var(--g400);margin-top:5px;display:flex;align-items:center;gap:5px">${I.minus()} Abzüge ${chf(abzt)} abgezogen</div>`:''}
        <svg width="420" height="52" style="overflow:visible;flex-shrink:0">
          <line x1="210" y1="0" x2="210" y2="30" stroke="#d6d6d6" stroke-width="1"/>
          <line x1="70" y1="30" x2="350" y2="30" stroke="#d6d6d6" stroke-width="1"/>
          <line x1="70" y1="30" x2="70" y2="52" stroke="#d6d6d6" stroke-width="1"/>
          <line x1="210" y1="30" x2="210" y2="52" stroke="#d6d6d6" stroke-width="1"/>
          <line x1="350" y1="30" x2="350" y2="52" stroke="#d6d6d6" stroke-width="1"/>
        </svg>
        <div style="display:flex;gap:14px">${heirCards}</div>


      </div>
      <div class="warn-bar" style="background:rgba(255,255,255,.6)">${I.warn()} Säule 3a und Pensionskasse fallen nicht in den Nachlass — Begünstigte separat beim Vorsorgeträger regeln.</div>
    </div>`;
}

function saveDigital(cid, cat){
  const c=cases.find(x=>x.id===cid); if(!c) return;
  const name=el('dg-name')?.value?.trim(); if(!name) return;
  if(!c.digitalNachlass) c.digitalNachlass=[];
  c.digitalNachlass.push({
    cat, name,
    user: el('dg-user')?.value?.trim()||'',
    passwortHinweis: el('dg-pw')?.value?.trim()||'',
    tod: el('dg-tod')?.value||'loeschen',
    erbe: el('dg-erbe')?.value||'',
    notiz: el('dg-notiz')?.value?.trim()||'',
  });
  hideModal('modal-digital');
  saveToStorage();
  renderTabContent();
}


function toggleDigitalErledigt(cid, idx){
  const cas=cases.find(x=>x.id===cid); if(!cas) return;
  const cat=window._selDigitalCat||'accounts';
  const catItems=cas.digitalNachlass.filter(d=>d.cat===cat);
  const item=catItems[idx];
  if(item) item.erledigt=!item.erledigt;
  saveToStorage();
  renderTabContent();
}
function deleteDigital(cid, idx){
  const c=cases.find(x=>x.id===cid); if(!c) return;
  const cat=window._selDigitalCat||'accounts';
  const catItems=c.digitalNachlass.filter(d=>d.cat===cat);
  const globalIdx=c.digitalNachlass.indexOf(catItems[idx]);
  if(globalIdx>=0) c.digitalNachlass.splice(globalIdx,1);
  window._selDigitalItem=null;
  saveToStorage();
  renderTabContent();
}

function deleteUpload(cid, idx){
  const c=cases.find(x=>x.id===cid); if(!c) return;
  c.uploads.splice(idx,1);
  selDocId='zusammenfassung';
  saveToStorage();
  renderTabContent();
}
function uploadDoc(cid, input){
  const f=input.files[0]; if(!f) return;
  const c=cases.find(x=>x.id===cid); if(!c) return;
  const reader=new FileReader();
  reader.onload=function(e){
    if(!c.uploads) c.uploads=[];
    c.uploads.push({
      name: f.name,
      date: new Date().toLocaleDateString('de-CH'),
      type: f.type,
      data: e.target.result
    });
    selDocId='upload_'+(c.uploads.length-1);
    saveToStorage();
    renderTabContent();
  };
  reader.readAsDataURL(f);
}
function downloadCurrentDoc(docName){
  // Vorschau-Inhalt inkl. Bearbeitungen in contenteditable
  const preview = document.querySelector('#tab-content [style*="794px"]');
  const previewInner = preview ? preview.innerHTML : buildDocHtml(getCase(), selDocId);
  const full='<!DOCTYPE html><html><head><meta charset="utf-8"><title>'+docName+'</title>'+
    '<style>'+
    'body{margin:0;background:#fff;font-family:Arial,Helvetica,sans-serif;}'+
    '[contenteditable]{border:none!important;outline:none!important;padding:10px 14px;}'+
    '@page{size:A4;margin:0;}'+
    '@media print{html,body{width:210mm;height:297mm;margin:0;padding:0;}'+
    '.no-print{display:none!important;}}'+
    '</style></head>'+
    '<body onload="window.print()">'+previewInner+'</body></html>';
  const w=window.open('','_blank','width=900,height=700');
  if(w){ w.document.write(full); w.document.close(); }
}
function downloadDoc(c, docId, docName){
  const html=buildDocHtml(c,docId);
  const full='<!DOCTYPE html><html><head><meta charset="utf-8"><title>'+docName+'</title><style>body{margin:0;background:#fff;}@media print{body{margin:0;}}</style></head><body>'+html+'</body></html>';
  const blob=new Blob([full],{type:'text/html'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=docName.replace(/[^a-zA-Z0-9äöüÄÖÜ]/g,'_')+'.html';
  a.click();
}

// ── ALLOC SLIDER ───────────────────────────────────────────────────────────
function slideAlloc(cid, aid, hid, v){
  const c=cases.find(x=>x.id===cid);
  const a=c.assets.find(x=>x.id===aid);
  const HEIRS=getHeirs(c);
  const others=HEIRS.filter(h=>h.id!==hid);
  const na={...a.allocs,[hid]:v};
  // Rest nur auf den Erben mit dem grössten Anteil verteilen
  // so bleiben alle anderen Werte unverändert
  const fixedSum=others.reduce((s,h)=>s+(na[h.id]||0),0);
  const rem=100-v;
  if(rem<0){
    // Überschreitung: alle proportional kürzen
    const factor=rem>=0?1:0;
    others.forEach(h=>na[h.id]=Math.round((na[h.id]||0)/Math.max(1,fixedSum)*Math.max(0,rem)));
  } else if(fixedSum<=rem){
    // Genug Platz: lass andere unverändert, letzter bekommt exakten Rest
    const diff=rem-fixedSum;
    // Verteile diff auf den Erben mit grösstem Anteil
    const largest=others.reduce((mx,h)=>na[h.id]>=(na[mx.id]||0)?h:mx, others[0]);
    if(largest) na[largest.id]=(na[largest.id]||0)+diff;
  } else {
    // fixedSum > rem: andere müssen gekürzt werden, nur den grössten kürzen
    const excess=fixedSum-rem;
    const largest=others.reduce((mx,h)=>na[h.id]>=(na[mx.id]||0)?h:mx, others[0]);
    if(largest) na[largest.id]=Math.max(0,(na[largest.id]||0)-excess);
  }
  // Sicherstellen dass Total genau 100 ist (Rundungsfehler)
  const tot=Object.values(na).reduce((s,x)=>s+x,0);
  if(tot!==100){
    const largest=others.reduce((mx,h)=>na[h.id]>=(na[mx.id]||0)?h:mx,others[0]);
    if(largest) na[largest.id]=Math.max(0,(na[largest.id]||0)+(100-tot));
  }
  a.allocs=na;
  renderTabContent();
}



function slideAllocChf(cid, aid, hid, chfVal){
  const c=cases.find(x=>x.id===cid);
  const a=c.assets.find(x=>x.id===aid);
  const dv=distVal(a);
  if(dv<=0) return;
  const pct=Math.min(100,Math.max(0,Math.round(chfVal/dv*100)));
  slideAlloc(cid,aid,hid,pct);
}

  renderTabContent();
}

function saveNewHeir(){
  const name=el('heir-name')?.value?.trim();
  const rolle=window._heirSelRolle;
  if(!name||!rolle) return;
  const geb=el('heir-geb')?.value||'';
  const c=getCase(); if(!c) return;
  if(!c.heirs) c.heirs=[...HEIRS_DEFAULT];
  const n=c.heirs.length+1;
  // Quoten gleichmässig neu verteilen
  const lp=Math.floor(100/n);
  c.heirs.forEach((h,i)=>{ h.legalPct=i<n-1?lp:100-lp*(n-1); h.pflichtPct=Math.floor(h.legalPct/2); });
  const isInst=window._heirIsInst||false;
  c.heirs.push({
    id:'h'+Date.now(),
    init:name.split(' ').filter(Boolean).map(w=>w[0]).join('').slice(0,2).toUpperCase(),
    name, role:rolle, geb,
    legalPct:lp, pflichtPct:isInst?0:Math.floor(lp/2),
    isInstitution:isInst,
  });
  ensureAllocs(c);
  window._heirSelRolle='';
  hideModal('modal-heir');
  renderTabContent();
}

function updateHeir(cid, hid, key, val){

  if(h){ h[key]=val; if(key==='name') h.init=val.split(' ').filter(Boolean).map(w=>w[0]).join('').slice(0,2).toUpperCase(); }
  if(!c.heirs) c.heirs=heirs;
  renderTabContent();
}

  c.heirs=heirs.filter(x=>x.id!==hid);
  delete (window._openHeirIds||{})[hid];
  // Assets: allocs für diesen Erben entfernen
  c.assets.forEach(a=>{ delete a.allocs[hid]; });
  renderTabContent();
}
function updateAsset(cid, aid, key, val){
  const c=cases.find(x=>x.id===cid);
  const a=c.assets.find(x=>x.id===aid);
  a[key]=val;
  // Hypothek-Abzug synchronisieren
  if(key==='hypothek'){
    const linked=c.abzuege.find(x=>x.assetId===aid&&x.typ==='hypothek');
    if(linked){ linked.betrag=val; linked.label='Hypothek '+a.label; }
    else if(val>0){
      c.abzuege.push({id:'abz'+Date.now(),typ:'hypothek',label:'Hypothek '+a.label,betrag:val,notiz:'',assetId:aid});
    }
  }
  // Label-Änderung: verknüpften Hypothek-Abzug Label auch aktualisieren
  if(key==='label'){
    const linked=c.abzuege.find(x=>x.assetId===aid&&x.typ==='hypothek');
    if(linked) linked.label='Hypothek '+val;
  }
  renderTabContent();
}
function deleteAsset(cid, aid){
  const c=cases.find(x=>x.id===cid);
  c.assets=c.assets.filter(x=>x.id!==aid);
  // Verknüpfte Hypothek-Abzüge auch entfernen
  c.abzuege=c.abzuege.filter(x=>x.assetId!==aid);

function updateAbz(cid,aid,key,val){
  const c=cases.find(x=>x.id===cid);
  const a=c.abzuege.find(x=>x.id===aid);
  a[key]=val;
  // Wenn Hypothek-Abzug geändert -> verknüpftes Asset synchronisieren
  if(key==='betrag'&&a.typ==='hypothek'&&a.assetId){
    const asset=c.assets.find(x=>x.id===a.assetId);
    if(asset) asset.hypothek=val;
  }

}
function delAbz(cid,aid){
  const c=cases.find(x=>x.id===cid);

  delete openAbzIds[aid];

}

  const allocs={};
  HEIRS.forEach(h=>allocs[h.id]=0);

function buildFallModal(){
  const steps=['Erblasser','Personen','Institutionen'];
  const stepsHtml=steps.map((s,i)=>{
    const n=i+1;
    const cls=fallStep>n?'done':fallStep===n?'cur':'todo';
    return `<div class="step">
      <div class="step-n ${cls}">${cls==='done'?'✓':n}</div>
      <span class="step-lbl ${cls==='cur'?'cur':'todo'}">${s}</span>
      ${i<2?'<div class="step-line"></div>':''}
    </div>`;

function checkFallBtn(){
  const btn=el('fall-next-btn'); if(!btn) return;
  const ok=!!(el('f-vn')?.value?.trim()&&el('f-nn')?.value?.trim());

  btn._ok=ok;
}
function fallNext(){
  if(fallStep===1){
    const vn=el('f-vn')?.value?.trim()||'';
    const nn=el('f-nn')?.value?.trim()||'';
    if(!vn||!nn) return;
    // Speichere in temporären Variablen
    window._fallErblasser={vn,nn,geb:el('f-geb')?.value||'',ort:el('f-ort')?.value||'',kt:el('f-kt')?.value||'ZH'};
  }
  fallStep++;
  buildFallModal();
}
function fallBack(){
  if(fallStep>1){fallStep--;buildFallModal();}
  else hideModal('modal-fall');
}

function addFallInst(){

function removeFallInst(id){

    <div class="person-chip">

    </div>`).join('');

function saveFall(){
  const eb=window._fallErblasser||{vn:'',nn:'',geb:'',ort:'',kt:'ZH'};
  const allPersons=[...fallPersonen,...fallInstitutionen];
  const n=allPersons.length;
  // Personen haben Pflichtteil, Institutionen nicht
  const nPersonen=fallPersonen.length;
  const newHeirs=allPersons.map((p,i)=>{
    const isInst = i>=fallPersonen.length;
    const lp = n>0?(i<n-1?Math.floor(100/n):100-Math.floor(100/n)*(n-1)):0;
    // Pflichtteil gilt nur für natürliche Personen mit Erbrecht
    const pp = isInst ? 0 : Math.floor(lp/2);
    return {
      id:p.id,
      init:p.name.split(' ').filter(Boolean).map(w=>w[0]).join('').slice(0,2).toUpperCase(),
      name:p.name,
      role:p.rolle||p.typ||'Begünstigte/r',
      isInstitution:isInst,
      legalPct:lp,
      pflichtPct:pp,
    };
  });
  const allocs={}; newHeirs.forEach(h=>allocs[h.id]=0);
  const newCase={
    id:'c'+Date.now(),
    name:'Nachlass '+eb.vn+' '+eb.nn,
    location:eb.ort||eb.kt, canton:eb.kt,
    status:'Entwurf', progress:5,
    heirs:newHeirs, assets:[], abzuege:[],
    erblasser:eb,
  };
  cases.push(newCase);
  hideModal('modal-fall');
  saveToStorage();
  openCase(newCase.id);
}

function saveExpert(kt, cat){
  const name=el('exp-name')?.value?.trim(); if(!name) return;
  if(!window._experts[kt]) window._experts[kt]={};
  if(!window._experts[kt][cat]) window._experts[kt][cat]=[];
  window._experts[kt][cat].push({
    name, firma:el('exp-firma')?.value?.trim()||'',
    tel:el('exp-tel')?.value?.trim()||'',
    email:el('exp-email')?.value?.trim()||'',
    adresse:el('exp-adresse')?.value?.trim()||''
  });
  hideModal('modal-expert');
  saveToStorage();
  renderExperts();
}

function deleteExpert(kt, cat, idx){
  if(window._experts?.[kt]?.[cat]) {
    window._experts[kt][cat].splice(idx,1);
    saveToStorage();
    renderExperts();
  }
}

            <div style="font-size:12px;color:var(--g500);line-height:1.6">${a.kurz}</div>
            <div style="margin-top:12px;font-size:11px;color:var(--g400);display:flex;align-items:center;gap:4px">Artikel lesen →</div>
          </div>`).join('')}
      </div>
    </div>

}

async function sendChatMessage(){
  const input = el('chat-input');
  const messages = el('chat-messages');
  if(!input || !messages) return;
  const text = input.value.trim();
  if(!text) return;
  input.value = '';

  // User-Nachricht anzeigen
  const userDiv = document.createElement('div');
  userDiv.style.cssText = 'background:#1a1a1a;border-radius:10px;padding:10px 14px;max-width:85%;align-self:flex-end;margin-left:auto';
  userDiv.innerHTML = '<div style="font-size:12px;font-weight:600;color:#999;margin-bottom:4px">Sie</div><div style="font-size:13px;color:white;line-height:1.6">'+text+'</div>';
  messages.appendChild(userDiv);

  // Loading Indicator
  const loadDiv = document.createElement('div');
  loadDiv.style.cssText = 'background:var(--g50);border:1px solid var(--g200);border-radius:10px;padding:10px 14px;max-width:85%;align-self:flex-start';
  loadDiv.innerHTML = '<div style="font-size:12px;font-weight:600;color:var(--g600);margin-bottom:4px">Assistent</div><div style="font-size:13px;color:var(--g400)">···</div>';
  messages.appendChild(loadDiv);
  messages.scrollTop = messages.scrollHeight;

  try {
    const apiKey = window._anthropicKey;
    if(!apiKey){ loadDiv.innerHTML='<div style="font-size:12px;font-weight:600;color:var(--g600);margin-bottom:4px">Assistent</div><div style="font-size:13px;color:var(--g400)">Bitte zuerst den API-Key einrichten (oben rechts).</div>'; return; }
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: 'Du bist ein Experte für Schweizer Erbrecht (ZGB). Beantworte Fragen präzise und praxisorientiert auf Deutsch. Verweise auf die relevanten ZGB-Artikel. Beachte die Erbrechtsrevision vom 1. Januar 2023. Halte Antworten kurz und verständlich (max. 3-4 Sätze, ausser bei komplexen Fragen). Du arbeitest für eine Anwaltskanzlei die Nachlassplanung betreibt.',
        messages: [{role:'user', content: text}]
      })
    });
    const data = await resp.json();
    const answer = data.content?.[0]?.text || 'Keine Antwort erhalten.';
    loadDiv.innerHTML = '<div style="font-size:12px;font-weight:600;color:var(--g600);margin-bottom:4px">Assistent</div><div style="font-size:13px;color:var(--g700);line-height:1.6">'+answer+'</div>';
  } catch(e) {
    loadDiv.innerHTML = '<div style="font-size:12px;font-weight:600;color:var(--g600);margin-bottom:4px">Assistent</div><div style="font-size:13px;color:var(--g400)">Verbindungsfehler. Bitte erneut versuchen.</div>';
  }
  messages.scrollTop = messages.scrollHeight;
}

function goTax(){ view='tax'; renderNav(); renderMain(); }
function goChat(){ view='chat'; renderNav(); renderMain(); }
function goExperts(){ view='experts'; renderNav(); renderMain(); }
function goLaw(){ view='law'; renderNav(); renderMain(); }



function calcStatus(cas){
  if(cas.abgeschlossen) return 'Abgeschlossen';
  const h=getHeirs(cas), n=netto(cas);
  if(!cas.erblasser?.vorname||cas.assets.length===0) return 'Entwurf';
  const totalDV=cas.assets.reduce((s,a)=>s+distVal(a),0);
  const allCovered=h.every(heir=>{
    const rawGot=cas.assets.reduce((s,a)=>{
      const m=a.mode||'legal';
      return s+(distVal(a)*(m==='legal'?heir.legalPct:(a.allocs[heir.id]||0))/100);
    },0);
    const got=totalDV>0?rawGot/totalDV*n:0;
    return got>=n*heir.pflichtPct/100;
  });
  if(allCovered&&cas.assets.length>=2) return 'Aktiv';
  return 'Entwurf';
}

function toggleAbschliessen(cid){
  const cas=cases.find(x=>x.id===cid);
  if(!cas) return;
  cas.abgeschlossen = !cas.abgeschlossen;
  saveToStorage();
  renderCase();
  renderNav();
}

function deleteCase(cid){
  if(!confirm('Fall wirklich löschen? Diese Aktion kann nicht rückgängig gemacht werden.')) return;
  cases = cases.filter(x=>x.id!==cid);
  activeCaseId = cases.length>0 ? cases[0].id : null;
  saveToStorage();
  if(activeCaseId) openCase(activeCaseId);
  else goHome();
}
function calcProgress(cas){
  if(cas.abgeschlossen) return 100;
  let p = 0;
  if(cas.erblasser?.vorname && cas.erblasser?.nachname) p+=25; // Erblasser erfasst
  if(cas.assets.length>0) p+=25;                               // Mind. 1 Asset
  if(cas.heirs&&cas.heirs.length>0) p+=25;                     // Erben erfasst
  if(cas.assets.length>=2) p+=25;                              // Mind. 2 Assets (vollständig)
  return Math.min(100, p);
}
function saveToStorage(){
  try {
    localStorage.setItem('nachlass_cases', JSON.stringify(cases));
    localStorage.setItem('nachlass_user', JSON.stringify(window._appUser||{}));
    localStorage.setItem('nachlass_experts', JSON.stringify(window._experts||{}));
    localStorage.setItem('nachlass_logoUrl', window._logoUrl||'');
  } catch(e){ console.warn('localStorage nicht verfügbar:', e); }
}

function loadFromStorage(){
  try {
    const savedKey = localStorage.getItem('anthropic_key');
    if(savedKey) window._anthropicKey = savedKey;
    const savedCases = localStorage.getItem('nachlass_cases');
    if(savedCases){
      cases = JSON.parse(savedCases);
      // Merge neue Felder aus INIT_CASES falls noch nicht vorhanden
      const initC1 = INIT_CASES.find(x=>x.id==='c1');
      const loadedC1 = cases.find(x=>x.id==='c1');
      if(initC1 && loadedC1){
        if(!loadedC1.digitalNachlass||loadedC1.digitalNachlass.length===0)
          loadedC1.digitalNachlass = initC1.digitalNachlass||[];
        if(!loadedC1.erblasser) loadedC1.erblasser = initC1.erblasser;
      }
    }
    const savedUser = localStorage.getItem('nachlass_user');
    if(savedUser){ window._appUser = JSON.parse(savedUser); }
    const savedExperts = localStorage.getItem('nachlass_experts');
    if(savedExperts){ window._experts = JSON.parse(savedExperts); }
    const savedLogo = localStorage.getItem('nachlass_logoUrl');
    if(savedLogo){ window._logoUrl = savedLogo; }
  } catch(e){ console.warn('localStorage Fehler:', e); }
}
// ── INIT ───────────────────────────────────────────────────────────────────
render();
</script>
